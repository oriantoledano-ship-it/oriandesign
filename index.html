<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orian Design — מעצב האתרים של ישראל</title>
<meta name="description" content="בונה מותגים יוקרתיים. אתרי תדמית, חנויות איקומרס, ודפי נחיתה שמוכרים.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Rubik:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================
     DESIGN TOKENS
     ============================================ */
  :root {
    /* Backgrounds */
    --bg-0: #000000;
    --bg-1: #050505;
    --bg-2: #0a0a0c;
    --bg-3: #111114;

    /* Inks */
    --ink: #ffffff;
    --ink-2: #d4d4d8;
    --ink-3: #8a8a92;
    --ink-4: #555560;
    --ink-5: #2a2a30;

    /* Primary — Gold (preserved from current site) */
    --gold: #f5c563;
    --gold-bright: #ffd97a;
    --gold-deep: #c89a3e;
    --gold-glow: rgba(245, 197, 99, 0.4);

    /* Secondary accents (deep, regal — to pair with gold) */
    --teal: #4dd4d4;
    --teal-glow: rgba(77, 212, 212, 0.4);
    --violet: #8b5cf6;
    --violet-glow: rgba(139, 92, 246, 0.4);

    /* Status */
    --whatsapp: #25d366;
    --danger: #ff4d6d;

    /* Lines */
    --line: rgba(255, 255, 255, 0.08);
    --line-2: rgba(255, 255, 255, 0.15);
    --line-gold: rgba(245, 197, 99, 0.3);

    /* Typography */
    --sans: 'Heebo', 'Rubik', system-ui, sans-serif;
    --display: 'Rubik', 'Heebo', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;

    /* Easings */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  html, body {
    overflow-x: hidden;
    max-width: 100vw;
    width: 100%;
  }
  body {
    background: var(--bg-0);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
  }

  /* ============================================
     STARFIELD CANVAS (background)
     ============================================ */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ============================================
     NAVIGATION — pill button on left, logo on right
     ============================================ */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--line);
  }

  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: inherit;
  }
  .logo img {
    height: 48px;
    width: auto;
    display: block;
    filter: drop-shadow(0 0 12px var(--gold-glow));
  }

  .nav-cta {
    padding: 13px 28px;
    background: var(--gold);
    color: var(--bg-0);
    border-radius: 100px;
    font-weight: 800;
    font-size: 15px;
    text-decoration: none;
    transition: all 0.4s var(--ease-spring);
    box-shadow: 0 0 30px var(--gold-glow);
    position: relative;
    overflow: hidden;
  }
  .nav-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.6s var(--ease-out);
  }
  .nav-cta:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px var(--gold-glow);
  }
  .nav-cta:hover::before {
    transform: translateX(100%);
  }

  /* ============================================
     WHATSAPP FLOATING BUTTON
     ============================================ */
  .wa-float {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 99;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--whatsapp);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
    transition: transform 0.4s var(--ease-spring);
    animation: wa-pulse 2.5s ease-in-out infinite;
  }
  .wa-float:hover {
    transform: scale(1.1);
  }
  .wa-float svg {
    width: 30px;
    height: 30px;
  }
  @keyframes wa-pulse {
    0%, 100% {
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4),
                  0 0 0 0 rgba(37, 211, 102, 0.4);
    }
    50% {
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4),
                  0 0 0 15px rgba(37, 211, 102, 0);
    }
  }

  /* ============================================
     HERO SECTION
     ============================================ */
  .hero {
    min-height: 100vh;
    padding: 120px 24px 80px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 1;
    overflow: hidden;
  }

  .hero-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 120vw);
    height: min(600px, 120vw);
    background: radial-gradient(circle, var(--gold-glow), transparent 60%);
    filter: blur(80px);
    opacity: 0.6;
    pointer-events: none;
    z-index: -1;
  }

  .hero-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: hero-rise 1.2s 0.3s var(--ease-out) forwards;
  }
  .hero-logo img {
    width: clamp(220px, 50vw, 380px);
    height: auto;
    display: block;
    filter: drop-shadow(0 0 60px var(--gold-glow))
            drop-shadow(0 0 30px rgba(245, 197, 99, 0.3));
  }

  .hero-tagline {
    font-family: var(--sans);
    font-weight: 500;
    font-size: clamp(16px, 2vw, 22px);
    color: var(--ink-2);
    margin-top: 24px;
    opacity: 0;
    animation: hero-rise 1.2s 0.8s var(--ease-out) forwards;
  }

  @keyframes hero-rise {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================
     SECTION — SUB-HERO (the big claim)
     ============================================ */
  .claim {
    padding: 80px 24px 100px;
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .claim.claim-opener {
    padding-top: 160px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .claim.claim-opener::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 120vw);
    height: min(600px, 120vw);
    background: radial-gradient(circle, var(--gold-glow), transparent 60%);
    filter: blur(80px);
    opacity: 0.4;
    pointer-events: none;
    z-index: -1;
  }
  .claim.claim-opener .claim-headline,
  .claim.claim-opener .claim-sub,
  .claim.claim-opener .pill-btn {
    position: relative;
    z-index: 1;
  }

  .claim-headline {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(42px, 9vw, 80px);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 28px;
  }
  .claim-headline .word-gold {
    color: var(--gold);
    text-shadow: 0 0 30px var(--gold-glow);
  }
  .claim-headline .word-violet {
    color: var(--violet);
    text-shadow: 0 0 30px var(--violet-glow);
  }
  /* Typing animation */
  .claim-headline {
    min-height: calc(2 * 1.05em);
  }
  .typing-line {
    white-space: pre-wrap;
  }
  .typing-cursor {
    display: inline-block;
    width: 0.06em;
    height: 0.9em;
    margin-right: 0.04em;
    transform: translateY(0.08em);
    background: var(--gold);
    box-shadow: 0 0 12px var(--gold-glow);
    vertical-align: baseline;
  }
  .typing-cursor.blink {
    animation: cursor-blink 0.6s steps(1) infinite;
  }
  @keyframes cursor-blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  .claim-sub {
    font-size: clamp(15px, 1.7vw, 18px);
    color: var(--ink-2);
    max-width: 480px;
    margin: 0 auto 50px;
    line-height: 1.6;
  }

  /* ============================================
     PILL BUTTON (primary CTA throughout)
     ============================================ */
  .pill-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px 48px;
    background: var(--gold);
    color: var(--bg-0);
    border-radius: 100px;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 17px;
    text-decoration: none;
    transition: all 0.4s var(--ease-spring);
    box-shadow: 0 8px 40px var(--gold-glow);
    position: relative;
    overflow: hidden;
    border: none;
    cursor: pointer;
    animation: btn-pulse 2.4s var(--ease-smooth) infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .pill-btn:hover {
    animation-play-state: paused;
  }
  .pill-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.45) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.7s var(--ease-out);
  }
  .pill-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 14px 60px var(--gold-glow);
  }
  .pill-btn:hover::before { transform: translateX(100%); }

  .pill-btn-gradient {
    background: linear-gradient(90deg, var(--violet) 0%, var(--gold) 100%);
    color: var(--ink);
    font-size: 19px;
    padding: 22px 60px;
    box-shadow: 0 0 60px rgba(139, 92, 246, 0.5),
                0 0 60px rgba(245, 197, 99, 0.3);
  }
  .pill-btn-gradient:hover {
    box-shadow: 0 0 80px rgba(139, 92, 246, 0.6),
                0 0 80px rgba(245, 197, 99, 0.4);
  }

  /* ============================================
     SECTION — ABOUT (HUD profile card)
     ============================================ */
  .section {
    padding: 80px 24px;
    position: relative;
    z-index: 2;
  }

  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: rgba(245, 197, 99, 0.05);
    border: 1px solid var(--line-gold);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .section-tag .dot {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--gold-glow);
    animation: tag-pulse 2s ease-in-out infinite;
  }
  @keyframes tag-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .section-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(36px, 7vw, 64px);
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin-bottom: 24px;
    text-align: center;
  }
  .portfolio-overtitle {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(22px, 4.5vw, 32px);
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 24px;
    text-shadow: 0 0 20px var(--gold-glow);
  }

  /* Chromatic split effect on titles */
  .chromatic {
    position: relative;
    display: inline-block;
    color: var(--ink);
  }
  .chromatic::before,
  .chromatic::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    opacity: 0.85;
  }
  .chromatic::before {
    color: var(--gold);
    transform: translate(-3px, -1px);
    mix-blend-mode: screen;
  }
  .chromatic::after {
    color: var(--violet);
    transform: translate(3px, 1px);
    mix-blend-mode: screen;
  }

  .about {
    text-align: center;
  }

  /* HUD profile frame with corner brackets */
  .hud-frame {
    position: relative;
    max-width: 480px;
    margin: 50px auto 40px;
    aspect-ratio: 3 / 4;
    border-radius: 16px;
    overflow: visible;
  }
  .hud-frame::before,
  .hud-frame::after,
  .hud-frame .hud-tr,
  .hud-frame .hud-bl {
    content: '';
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: var(--gold);
    border-style: solid;
    z-index: 2;
    filter: drop-shadow(0 0 6px var(--gold-glow));
  }
  .hud-frame::before {
    top: -8px;
    right: -8px;
    border-width: 2px 2px 0 0;
    border-radius: 0 8px 0 0;
  }
  .hud-frame::after {
    bottom: -8px;
    left: -8px;
    border-width: 0 0 2px 2px;
    border-radius: 0 0 0 8px;
  }
  .hud-frame .hud-tr {
    top: -8px;
    left: -8px;
    border-width: 2px 0 0 2px;
    border-radius: 8px 0 0 0;
  }
  .hud-frame .hud-bl {
    bottom: -8px;
    right: -8px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 8px 0;
  }

  .hud-image {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    overflow: hidden;
    background:
      linear-gradient(135deg, var(--bg-2), var(--bg-3));
  }
  .hud-image::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    opacity: 0.4;
  }
  .hud-image-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .hud-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: relative;
    z-index: 1;
  }

  .hud-status {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid var(--whatsapp);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--whatsapp);
    letter-spacing: 0.25em;
    backdrop-filter: blur(10px);
  }
  .hud-status .dot {
    width: 8px;
    height: 8px;
    background: var(--whatsapp);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--whatsapp);
    animation: tag-pulse 2s ease-in-out infinite;
  }

  .hud-name-tag {
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 3;
    padding: 8px 18px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid var(--line-gold);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.3em;
    backdrop-filter: blur(10px);
  }

  .about-text {
    max-width: 540px;
    margin: 0 auto;
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .about-text p { margin-bottom: 18px; }
  .about-text strong {
    color: var(--ink);
    font-weight: 800;
  }
  .about-text .hl-gold {
    color: var(--gold);
    font-weight: 700;
  }
  .about-text .hl-violet {
    color: var(--violet);
    font-weight: 700;
  }

  /* ============================================
     STATS — 3 cards
     ============================================ */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 540px;
    margin: 50px auto 0;
  }
  /* The 4th card (revenue) spans full width and gets special styling */
  .stat-card.featured {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(245, 197, 99, 0.08), rgba(139, 92, 246, 0.05));
    border-color: var(--gold);
    padding: 32px 20px;
    margin-top: 10px;
  }
  .stat-card.featured .stat-icon svg {
    width: 36px;
    height: 36px;
  }
  .stat-card.featured .stat-num {
    background: linear-gradient(90deg, var(--gold-bright), var(--gold), var(--gold-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: clamp(30px, 6.5vw, 44px);
  }
  .stat-card {
    padding: 18px 8px;
    background: var(--bg-2);
    border: 1px solid var(--line-gold);
    border-radius: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.4s var(--ease-out);
  }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-glow), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .stat-card:hover {
    transform: translateY(-5px);
    border-color: var(--gold);
    box-shadow: 0 12px 40px rgba(245, 197, 99, 0.15);
  }
  .stat-card:hover::before { opacity: 0.4; }
  .stat-card > * { position: relative; z-index: 1; }
  .stat-icon {
    color: var(--gold);
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px var(--gold))
            drop-shadow(0 0 20px var(--gold-glow));
  }
  .stat-icon svg {
    width: 24px;
    height: 24px;
  }
  .stat-num {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(20px, 4.2vw, 28px);
    color: var(--ink);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 18px rgba(245, 197, 99, 0.5),
                 0 0 8px rgba(255, 255, 255, 0.3);
  }
  .stat-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.3;
    text-shadow: 0 0 8px var(--gold-glow);
  }
  /* Featured card (500K) gets even stronger glow */
  .stat-card.featured .stat-icon {
    filter: drop-shadow(0 0 16px var(--gold-bright))
            drop-shadow(0 0 30px var(--gold-glow));
  }
  .stat-card.featured .stat-num {
    text-shadow: 0 0 30px var(--gold),
                 0 0 50px var(--gold-glow);
  }
  .stat-card.featured .stat-label {
    text-shadow: 0 0 12px var(--gold);
  }

  /* ============================================
     PORTFOLIO CAROUSEL
     ============================================ */
  .portfolio {
    text-align: center;
    overflow: hidden;
    padding-bottom: 100px;
    position: relative;
  }
  .portfolio-track-wrap {
    overflow: hidden;
    position: relative;
    margin-top: 60px;
    padding: 30px 0;
    mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
    direction: ltr; /* Force LTR so marquee flows naturally */
  }
  .portfolio-track {
    display: flex;
    width: max-content;
    animation: portfolio-marquee 30s linear infinite;
  }
  @keyframes portfolio-marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .portfolio-track .portfolio-card { direction: rtl; }

  .portfolio-card {
    flex: 0 0 auto;
    width: 200px;
    margin: 0 12px;
    text-align: center;
    transition: all 0.5s var(--ease-out);
  }

  /* Phone mockup (iPhone-style) — smaller */
  .phone {
    position: relative;
    background: linear-gradient(180deg, #1a1a1e 0%, #0a0a0e 100%);
    border-radius: 26px;
    padding: 7px;
    box-shadow:
      0 20px 40px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(245, 197, 99, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    aspect-ratio: 9 / 19.5;
    max-width: 200px;
    margin: 0 auto;
  }
  .phone::before {
    display: none;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: var(--bg-1);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .phone-screen-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 10px;
    background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
    padding: 12px;
    text-align: center;
  }

  .portfolio-name {
    margin-top: 18px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-3);
  }

  /* ============================================
     BIG NUMBERS section
     ============================================ */
  .big-numbers {
    padding: 100px 24px;
    text-align: center;
    background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
  }

  .big-number-block {
    margin: 100px auto;
    max-width: 600px;
  }
  .big-number-block:first-of-type { margin-top: 60px; }
  .big-number-block:last-of-type { margin-bottom: 60px; }

  .big-num-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .big-num {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(54px, 12vw, 100px);
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 16px;
  }
  .big-num.gold {
    color: var(--gold);
    text-shadow: 0 0 40px var(--gold-glow),
                 0 0 80px var(--gold-glow);
  }
  .big-num.violet {
    color: var(--violet);
    text-shadow: 0 0 40px var(--violet-glow),
                 0 0 80px var(--violet-glow);
  }
  .big-num-desc {
    font-size: 16px;
    color: var(--ink-2);
    margin-bottom: 24px;
  }
  .big-num-divider {
    width: 100%;
    max-width: 480px;
    height: 2px;
    margin: 0 auto;
    border-radius: 2px;
  }
  .big-num-divider.gold {
    background: linear-gradient(90deg, transparent, var(--gold-deep), var(--gold), var(--gold-bright), transparent);
  }
  .big-num-divider.violet {
    background: linear-gradient(90deg, transparent, #4a1d96, var(--violet), #c4b5fd, transparent);
  }

  /* ============================================
     VOICE TESTIMONIAL CARD
     ============================================ */
  .testimonial-section {
    padding: 100px 24px;
    text-align: center;
  }

  .testimonial-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(28px, 5vw, 40px);
    line-height: 1.2;
    margin-bottom: 40px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
    color: var(--gold);
  }

  .voice-card {
    max-width: 520px;
    margin: 0 auto 50px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line-gold);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .voice-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, var(--gold-glow), transparent 50%);
    opacity: 0.15;
    pointer-events: none;
  }
  .voice-card > * { position: relative; z-index: 1; }

  .voice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .voice-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(37, 211, 102, 0.1);
    border: 1px solid rgba(37, 211, 102, 0.4);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--whatsapp);
    letter-spacing: 0.2em;
    font-weight: 700;
  }
  .voice-badge .dot {
    width: 6px;
    height: 6px;
    background: var(--whatsapp);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--whatsapp);
  }
  .voice-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .voice-author-info {
    text-align: right;
  }
  .voice-author-name {
    font-weight: 800;
    color: var(--ink);
    font-size: 16px;
  }
  .voice-author-role {
    color: var(--gold);
    font-size: 12px;
    margin-top: 2px;
  }
  .voice-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: var(--ink);
    font-size: 18px;
  }

  .voice-quote {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.6;
    text-align: right;
    margin-bottom: 24px;
    font-weight: 500;
  }
  .voice-quote .hl-violet { color: var(--violet); font-weight: 700; }

  .voice-player {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-top: 4px;
  }
  .voice-timer {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-3);
    min-width: 36px;
  }
  .voice-waveform {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }
  .voice-bar {
    flex: 1;
    background: var(--gold);
    border-radius: 2px;
    transition: background 0.3s;
    opacity: 0.4;
  }
  .voice-bar.played {
    opacity: 1;
    box-shadow: 0 0 8px var(--gold-glow);
  }
  .voice-play {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg-0);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s var(--ease-spring);
    box-shadow: 0 4px 20px var(--gold-glow);
  }
  .voice-play:hover {
    transform: scale(1.08);
    background: var(--gold-bright);
  }
  .voice-play svg {
    width: 18px;
    height: 18px;
  }

  /* ============================================
     SERVICES — vertical cards
     ============================================ */
  .services {
    padding: 100px 24px;
    text-align: center;
  }
  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 540px;
    margin: 60px auto 0;
  }

  .service-card {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 40px 28px;
    position: relative;
    overflow: hidden;
    transition: all 0.5s var(--ease-out);
  }
  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.02) 0%, transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,0.02) 0%, transparent 50%);
    pointer-events: none;
  }
  /* Hexagon pattern */
  .service-card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 1l25.98 15v30L30 61 4.02 46V16z' stroke='%23ffffff' stroke-width='0.8' fill='none' /%3E%3C/svg%3E");
    background-size: 60px 52px;
    pointer-events: none;
  }
  .service-card > * { position: relative; z-index: 1; }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: var(--line-gold);
  }

  .service-num {
    position: absolute;
    top: 32px;
    left: 32px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.2em;
  }
  .service-terminal {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.3em;
  }
  .service-terminal .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }
  .service-terminal.gold-dot .dot { background: var(--gold); color: var(--gold); }
  .service-terminal.violet-dot .dot { background: var(--violet); color: var(--violet); }
  .service-terminal.teal-dot .dot { background: var(--teal); color: var(--teal); }

  .service-icon-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .service-icon-wrap::before,
  .service-icon-wrap::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border-style: dashed;
    border-width: 1px;
  }
  .service-icon-wrap::before {
    width: 100%;
    height: 100%;
    animation: ring-spin 20s linear infinite;
  }
  .service-icon-wrap::after {
    width: 80%;
    height: 80%;
    animation: ring-spin 30s linear infinite reverse;
  }
  .service-card.gold-card .service-icon-wrap::before { border-color: rgba(245, 197, 99, 0.4); }
  .service-card.gold-card .service-icon-wrap::after { border-color: rgba(245, 197, 99, 0.25); }
  .service-card.violet-card .service-icon-wrap::before { border-color: rgba(139, 92, 246, 0.4); }
  .service-card.violet-card .service-icon-wrap::after { border-color: rgba(139, 92, 246, 0.25); }
  .service-card.teal-card .service-icon-wrap::before { border-color: rgba(77, 212, 212, 0.4); }
  .service-card.teal-card .service-icon-wrap::after { border-color: rgba(77, 212, 212, 0.25); }

  @keyframes ring-spin {
    to { transform: rotate(360deg); }
  }

  .service-icon {
    width: 56px;
    height: 56px;
    position: relative;
    z-index: 1;
  }
  .service-icon-img {
    width: 64px;
    height: 64px;
    position: relative;
    z-index: 1;
    object-fit: contain;
    filter: drop-shadow(0 0 16px var(--gold-glow));
  }
  .service-card.gold-card .service-icon { color: var(--gold); filter: drop-shadow(0 0 16px var(--gold-glow)); }
  .service-card.violet-card .service-icon { color: var(--violet); filter: drop-shadow(0 0 16px var(--violet-glow)); }
  .service-card.teal-card .service-icon { color: var(--teal); filter: drop-shadow(0 0 16px var(--teal-glow)); }

  .service-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .service-card.gold-card .service-pill {
    background: rgba(245, 197, 99, 0.08);
    border: 1px solid var(--line-gold);
    color: var(--gold);
  }
  .service-card.violet-card .service-pill {
    background: rgba(139, 92, 246, 0.08);
    border: 1px solid rgba(139, 92, 246, 0.3);
    color: var(--violet);
  }
  .service-card.teal-card .service-pill {
    background: rgba(77, 212, 212, 0.08);
    border: 1px solid rgba(77, 212, 212, 0.3);
    color: var(--teal);
  }

  .service-title {
    font-family: var(--display);
    font-weight: 800;
    font-size: 26px;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .service-title em {
    font-style: normal;
    font-weight: 900;
  }
  .service-card.gold-card .service-title em { color: var(--gold); }
  .service-card.violet-card .service-title em { color: var(--violet); }
  .service-card.teal-card .service-title em { color: var(--teal); }

  .service-desc {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 auto;
  }

  /* ============================================
     WHY ME — feature cards
     ============================================ */
  .why-me {
    padding: 100px 24px;
    text-align: center;
  }
  .why-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 540px;
    margin: 60px auto 0;
  }
  .why-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: right;
    transition: all 0.4s var(--ease-out);
  }
  .why-card:hover {
    border-color: var(--line-gold);
    transform: translateX(-4px);
  }
  .why-icon {
    width: 42px;
    height: 42px;
    margin-bottom: 20px;
  }
  .why-card.gold-card .why-icon { color: var(--gold); filter: drop-shadow(0 0 12px var(--gold-glow)); }
  .why-card.violet-card .why-icon { color: var(--violet); filter: drop-shadow(0 0 12px var(--violet-glow)); }
  .why-card.teal-card .why-icon { color: var(--teal); filter: drop-shadow(0 0 12px var(--teal-glow)); }
  .why-card.warm-card .why-icon { color: #ff8c61; filter: drop-shadow(0 0 12px rgba(255, 140, 97, 0.4)); }

  .why-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: 22px;
    line-height: 1.2;
    margin-bottom: 12px;
    background: linear-gradient(90deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .why-desc {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.65;
  }

  /* ============================================
     PROCESS TIMELINE
     ============================================ */
  .process {
    padding: 100px 24px;
    text-align: center;
  }
  .process-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(40px, 8vw, 64px);
    line-height: 1;
    margin-bottom: 70px;
    letter-spacing: -0.03em;
  }

  .timeline {
    max-width: 540px;
    margin: 0 auto;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    top: 24px;
    bottom: 24px;
    right: 30px;
    width: 2px;
    background: linear-gradient(180deg, var(--gold), var(--violet), var(--gold));
    border-radius: 2px;
    box-shadow: 0 0 12px var(--gold-glow);
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 36px;
    text-align: right;
    direction: rtl;
  }
  .step-icon {
    flex-shrink: 0;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: var(--bg-0);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    position: relative;
    z-index: 1;
    box-shadow: 0 0 24px var(--gold-glow),
                inset 0 0 12px rgba(245, 197, 99, 0.15);
  }
  .step-icon svg {
    width: 24px;
    height: 24px;
  }
  .step-content {
    flex: 1;
    padding-top: 14px;
  }
  .step-name {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .step-desc {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
  }

  /* ============================================
     FOOTER
     ============================================ */
  footer {
    padding: 80px 24px 40px;
    background: var(--bg-1);
    border-top: 1px solid var(--line);
    position: relative;
    z-index: 2;
  }
  .footer-grid {
    max-width: 540px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 50px;
  }
  .footer-col h4 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .footer-col a {
    display: block;
    color: var(--ink-2);
    text-decoration: none;
    padding: 6px 0;
    font-size: 14px;
    transition: color 0.3s;
  }
  .footer-col a:hover { color: var(--gold); }
  .footer-contact a {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .footer-contact svg {
    width: 18px;
    height: 18px;
    color: var(--ink-3);
  }
  .footer-bottom {
    text-align: center;
    padding-top: 30px;
    border-top: 1px solid var(--line);
    color: var(--ink-3);
    font-size: 12px;
  }

  /* ============================================
     SCROLL REVEAL ANIMATION
     ============================================ */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }
  /* Service cards slide in from the left (left -> right) instead of rising up */
  .reveal-side {
    transform: translateX(-160px);
    transition: opacity 1.8s var(--ease-out), transform 1.8s var(--ease-out);
  }
  .reveal-side.in {
    transform: translateX(0);
  }
  .services-grid .reveal-side:nth-child(1) { transition-delay: 0s; }
  .services-grid .reveal-side:nth-child(2) { transition-delay: 0.2s; }
  .services-grid .reveal-side:nth-child(3) { transition-delay: 0.4s; }
  .services-grid .reveal-side:nth-child(4) { transition-delay: 0.6s; }
  .why-grid .reveal-side:nth-child(1) { transition-delay: 0s; }
  .why-grid .reveal-side:nth-child(2) { transition-delay: 0.2s; }
  .why-grid .reveal-side:nth-child(3) { transition-delay: 0.4s; }
  .why-grid .reveal-side:nth-child(4) { transition-delay: 0.6s; }

  /* Slide in from the RIGHT */
  .reveal-side-right {
    transform: translateX(160px);
    transition: opacity 1.8s var(--ease-out), transform 1.8s var(--ease-out);
  }
  .reveal-side-right.in {
    transform: translateX(0);
  }
  /* Dramatic entrance — slow zoom + fade with a glow pulse to draw attention */
  .reveal-dramatic {
    opacity: 0;
    transform: scale(0.78);
    transition: opacity 2.6s var(--ease-out), transform 2.6s var(--ease-out);
  }
  .reveal-dramatic.in {
    opacity: 1;
    transform: scale(1);
    animation: dramatic-glow 2.6s ease-out 1;
  }
  @keyframes dramatic-glow {
    0% { filter: drop-shadow(0 0 0 var(--gold-glow)); }
    55% { filter: drop-shadow(0 0 45px var(--gold-bright)); }
    100% { filter: drop-shadow(0 0 0 var(--gold-glow)); }
  }

  /* ============================================
     FEAR SECTION — dark dramatic
     ============================================ */
  .fear {
    padding: 100px 24px;
    position: relative;
    z-index: 2;
    text-align: center;
    overflow: hidden;
  }
  .fear::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(700px, 130vw);
    height: min(700px, 130vw);
    background: radial-gradient(circle, rgba(220, 38, 38, 0.18), transparent 60%);
    filter: blur(80px);
    pointer-events: none;
    z-index: -1;
    animation: fear-pulse 4s ease-in-out infinite;
  }
  @keyframes fear-pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.05); }
  }
  .fear-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(36px, 7vw, 64px);
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin-bottom: 36px;
    color: var(--ink);
  }
  .fear-title .word-danger {
    color: #ff2d2d;
    text-shadow:
      0 0 8px rgba(255, 45, 45, 0.9),
      0 0 24px rgba(255, 45, 45, 0.7),
      0 0 48px rgba(255, 0, 0, 0.5);
    animation: danger-flicker 3s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes danger-flicker {
    0%, 100% { opacity: 1; }
    93% { opacity: 1; }
    94% { opacity: 0.6; }
    95% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
  }
  .fear-text {
    max-width: 580px;
    margin: 0 auto;
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-2);
    text-align: right;
  }
  .fear-text p {
    margin-bottom: 20px;
  }
  .fear-text strong {
    color: var(--ink);
    font-weight: 800;
  }
  .fear-text .hl-danger {
    color: #ff4d6d;
    font-weight: 700;
  }
  .fear-text .hl-gold {
    color: var(--gold);
    font-weight: 700;
  }
  .fear-question {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(20px, 3.5vw, 26px);
    line-height: 1.4;
    color: var(--ink);
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid rgba(255, 77, 109, 0.2);
    text-align: center;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .fear-question .hl-gold {
    color: var(--gold);
    text-shadow: 0 0 12px var(--gold-glow);
  }

  /* ============================================
     SUCCESS TESTIMONIALS — image carousel
     ============================================ */
  .success-section {
    padding: 80px 24px 120px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .success-title {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(34px, 6.5vw, 56px);
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin-bottom: 50px;
    color: var(--ink);
  }
  .success-title .word-danger {
    color: #ff2d2d;
    text-shadow:
      0 0 8px rgba(255, 45, 45, 0.9),
      0 0 24px rgba(255, 45, 45, 0.6);
  }
  .success-title .word-gold {
    color: var(--gold);
    text-shadow: 0 0 24px var(--gold-glow);
  }
  .success-track-wrap {
    overflow: hidden;
    position: relative;
    padding: 30px 0 40px;
    mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
    direction: ltr; /* Force LTR so marquee flows naturally */
  }
  .success-track {
    display: flex;
    gap: 20px;
    width: max-content;
    animation: success-marquee 40s linear infinite;
  }
  @keyframes success-marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .success-track .success-card { direction: rtl; }

  .success-card {
    flex: 0 0 min(380px, 80vw);
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line-gold);
    border-radius: 24px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.5s var(--ease-out);
    animation: card-float 6s ease-in-out infinite;
  }
  .success-card:nth-child(2) { animation-delay: -2s; }
  .success-card:nth-child(3) { animation-delay: -4s; }
  .success-card:nth-child(4) { animation-delay: -1s; }
  .success-card:nth-child(5) { animation-delay: -3s; }
  .success-card:nth-child(6) { animation-delay: -5s; }
  @keyframes card-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .success-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1.5px;
    background: linear-gradient(135deg,
      var(--gold-bright) 0%,
      var(--gold) 30%,
      transparent 50%,
      var(--gold-deep) 80%,
      var(--gold) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
  }
  .success-card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 60%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(245, 197, 99, 0.15) 50%,
      transparent 100%);
    transform: rotate(45deg);
    animation: card-shimmer 6s linear infinite;
    pointer-events: none;
  }
  @keyframes card-shimmer {
    0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
    100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
  }
  .success-card-tag {
    position: absolute;
    top: 26px;
    right: 26px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(37, 211, 102, 0.15);
    border: 1px solid rgba(37, 211, 102, 0.4);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--whatsapp);
    letter-spacing: 0.2em;
    backdrop-filter: blur(10px);
  }
  .success-card-tag .dot {
    width: 6px;
    height: 6px;
    background: var(--whatsapp);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--whatsapp);
    animation: tag-pulse 2s ease-in-out infinite;
  }
  .success-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
    position: relative;
    z-index: 1;
  }
  .success-card-revenue {
    position: relative;
    z-index: 2;
    margin-top: 16px;
    padding: 14px 10px 6px;
    text-align: center;
    border-top: 1px solid var(--line);
  }
  .success-card-revenue-num {
    font-family: var(--display);
    font-weight: 900;
    font-size: 22px;
    background: linear-gradient(90deg, var(--gold-bright), var(--gold), var(--gold-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px var(--gold-glow);
    line-height: 1;
    margin-bottom: 4px;
  }
  .success-card-revenue-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (min-width: 768px) {
    .section { padding: 100px 5vw; }
    .stats-grid { gap: 16px; }
    .why-grid {
      grid-template-columns: 1fr 1fr;
      max-width: 760px;
    }
    .services-grid { max-width: 760px; }
  }

  @media (max-width: 380px) {
    .nav-cta { padding: 10px 18px; font-size: 13px; }
    .stat-card { padding: 14px 6px; }
    .stat-label { font-size: 9px; }
    .stat-card.featured { padding: 24px 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
